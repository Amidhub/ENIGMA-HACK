version: '3.7'
services:
  db:
    image: postgres:15
    container_name: db
    env_file:
      - .env-non-dev
    ports:
      - 5432:5432
  
  redis:
    image: redis:7
    container_name: redis

  app:
    image: app
    build:
      context: .
    container_name: app
    env_file:
      - .env-non-dev
    depends_on:
      - db
      - redis
    command: ["/app/docker/app.sh"]
    ports:
      - 7777:8000
  
  celery-worker:
    build:
      context: .
    container_name: celery-worker
    depends_on:
      - redis
    command: celery -A app.tasks.celery worker --loglevel=info --pool=solo

  celery-beat:
    build:
      context: .
    container_name: celery-beat
    depends_on:
      - redis
    command: celery -A app.tasks.celery beat --loglevel=info
    